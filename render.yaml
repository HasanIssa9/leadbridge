services:
  - type: web
    name: leadbridge-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: leadbridge-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: ALLOWED_ORIGINS
        value: https://leadbridge-iraq.web.app,https://leadbridge-iraq.firebaseapp.com,https://hasanissa9.github.io
      - key: APP_URL
        value: https://leadbridge-api.onrender.com
      - key: PORT
        value: 3000

databases:
  - name: leadbridge-db
    databaseName: leadbridge
    user: leadbridge_user
    plan: free

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build Android APK ──────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.API_URL || 'https://us-central1-leadbridge-iraq.cloudfunctions.net/api' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: leadbridge-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Deploy Flutter Web to Firebase Hosting ─────────────
  web:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Web
        working-directory: flutter_app
        run: |
          flutter build web --release \
            --dart-define=API_URL=${{ secrets.API_URL || 'https://us-central1-leadbridge-iraq.cloudfunctions.net/api' }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: leadbridge-iraq
          channelId: live

  # ── Deploy Backend to Firebase Functions ───────────────
  functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Deploy Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: leadbridge-iraq

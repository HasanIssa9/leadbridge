name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build Android APK ──────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.API_URL || 'https://leadbridge-api.onrender.com/api' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: leadbridge-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Build & Deploy Web ─────────────────────────────────
  web:
    name: Deploy Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Web
        working-directory: flutter_app
        run: |
          flutter build web --release \
            --dart-define=API_URL=${{ secrets.API_URL || 'https://leadbridge-api.onrender.com/api' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
